<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,900&display=swap" rel="stylesheet">
<style>
  body { background:#f6f1e7; font-family:monospace; padding:40px; color:#1c1a17; }
  .row { display:flex; align-items:center; gap:28px; margin-bottom:36px; }
  .chip { background:#fffdf8; border:1px solid #e3dac9; padding:16px; border-radius:10px; text-align:center; }
  .chip small { display:block; margin-top:8px; color:#8d8577; }
  .dark { background:#1c1a17; }
  /* wordmark lockup exactly as it will be rendered to PNG */
  #lockup {
    display:inline-flex; align-items:center; gap:18px;
    padding:20px 28px; background:transparent;
  }
  #lockup img { width:72px; height:72px; }
  #lockup span {
    font-family:"Fraunces", Georgia, serif; font-weight:900;
    font-size:58px; letter-spacing:-0.015em; color:#1c1a17;
  }
</style>
</head>
<body>
  <h3>mark at favicon sizes</h3>
  <div class="row">
    <div class="chip"><img src="../web/public/icon.svg" width="16" height="16"><small>16</small></div>
    <div class="chip"><img src="../web/public/icon.svg" width="32" height="32"><small>32</small></div>
    <div class="chip"><img src="../web/public/icon.svg" width="48" height="48"><small>48</small></div>
    <div class="chip"><img src="../web/public/icon.svg" width="96" height="96"><small>96</small></div>
    <div class="chip"><img src="../web/public/icon.svg" width="180" height="180"><small>180</small></div>
    <div class="chip dark"><img src="../web/public/icon.svg" width="64" height="64"><small style="color:#8d8577">on dark</small></div>
  </div>

  <h3>privy / email lockup (rendered to PNG from this node)</h3>
  <div id="lockup">
    <img src="../web/public/icon.svg">
    <span>TabMates</span>
  </div>

  <h3>exact-size capture nodes</h3>
  <!-- apple-touch-icon: solid paper bg, iOS adds its own corner radius -->
  <div id="touch" style="width:180px;height:180px;background:#f6f1e7;display:flex;align-items:center;justify-content:center;">
    <img src="../web/public/icon.svg" style="width:150px;height:150px;">
  </div>
  <!-- png favicon fallback, transparent -->
  <div id="fav" style="width:96px;height:96px;display:flex;align-items:center;justify-content:center;">
    <img src="../web/public/icon.svg" style="width:96px;height:96px;">
  </div>
</body>
</html>
